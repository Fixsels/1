<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SCAN.TEXT — Object Text Detector</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

  :root {
    --bg: #060a0f;
    --surface: #0b1218;
    --panel: #0f1c24;
    --accent: #00ffa3;
    --accent2: #00c8ff;
    --warn: #ff6b35;
    --text: #c8e6f0;
    --dim: #3a5a6a;
    --scan-line: rgba(0, 255, 163, 0.08);
    --glow: 0 0 20px rgba(0, 255, 163, 0.4);
    --glow2: 0 0 20px rgba(0, 200, 255, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* CRT scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.05) 2px,
      rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* Noise grain */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 998;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid rgba(0,255,163,0.15);
    background: linear-gradient(90deg, rgba(0,255,163,0.04), transparent, rgba(0,200,255,0.04));
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 6px;
    color: var(--accent);
    text-shadow: var(--glow);
  }

  .logo span { color: var(--accent2); }

  .status-bar {
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ── Main layout ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 0;
    height: calc(100vh - 65px);
  }

  /* ── Camera section ── */
  .camera-section {
    position: relative;
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 16px;
    border-right: 1px solid rgba(0,255,163,0.1);
  }

  .camera-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .camera-label::before {
    content: '';
    display: block;
    width: 20px;
    height: 1px;
    background: var(--dim);
  }

  .viewport {
    position: relative;
    flex: 1;
    background: #000;
    border: 1px solid rgba(0,255,163,0.2);
    overflow: hidden;
    border-radius: 4px;
  }

  /* Corner brackets */
  .viewport::before,
  .viewport::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--accent);
    border-style: solid;
    z-index: 10;
  }
  .viewport::before { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .viewport::after  { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1);
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    transform: scaleX(-1);
  }

  /* Scan animation line */
  .scan-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .scan-overlay.active { opacity: 1; }

  .scan-line-anim {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 20px var(--accent), 0 0 60px rgba(0,255,163,0.3);
    animation: scanMove 1.5s linear infinite;
  }

  @keyframes scanMove {
    0%   { top: 0%; }
    100% { top: 100%; }
  }

  .scan-overlay::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      180deg,
      rgba(0,255,163,0.04) 0%,
      transparent 50%,
      rgba(0,255,163,0.04) 100%
    );
  }

  /* Reticle crosshair */
  .reticle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 160px; height: 160px;
    pointer-events: none;
    z-index: 6;
    opacity: 0.6;
  }

  .reticle-ring {
    width: 100%; height: 100%;
    border: 1px solid rgba(0,255,163,0.4);
    border-radius: 50%;
    position: absolute;
    animation: pulseRing 3s ease-in-out infinite;
  }

  .reticle-inner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 10px; height: 10px;
  }

  .reticle-inner::before, .reticle-inner::after {
    content: '';
    position: absolute;
    background: var(--accent);
  }
  .reticle-inner::before { width: 1px; height: 10px; left: 50%; top: 0; }
  .reticle-inner::after  { width: 10px; height: 1px; top: 50%; left: 0; }

  @keyframes pulseRing {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
    50% { transform: translate(-50%, -50%) scale(1.08); opacity: 0.8; }
  }

  /* Camera start prompt */
  #startPrompt {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: rgba(0,0,0,0.8);
    z-index: 20;
  }

  #startPrompt .prompt-icon {
    font-size: 48px;
    filter: drop-shadow(0 0 12px var(--accent));
  }

  #startPrompt p {
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    font-weight: 700;
    padding: 12px 24px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    border-radius: 2px;
    text-transform: uppercase;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-101%);
    transition: transform 0.2s;
  }

  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: var(--bg); box-shadow: var(--glow); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn:disabled:hover::before { transform: translateX(-101%); }
  .btn:disabled:hover { color: var(--accent); box-shadow: none; }

  .btn span { position: relative; z-index: 1; }

  .btn-secondary {
    border-color: var(--accent2);
    color: var(--accent2);
  }
  .btn-secondary::before { background: var(--accent2); }
  .btn-secondary:hover { color: var(--bg); box-shadow: var(--glow2); }

  .btn-scan {
    flex: 1;
    padding: 14px;
    font-size: 11px;
    letter-spacing: 4px;
  }

  .mode-indicator {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    margin-left: auto;
  }

  /* ── Right panel ── */
  .panel {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid rgba(0,255,163,0.1);
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ── Object info ── */
  .object-display {
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .object-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 10px;
  }

  .object-name {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 900;
    color: var(--accent2);
    text-shadow: var(--glow2);
    min-height: 36px;
    letter-spacing: 2px;
  }

  .object-confidence {
    margin-top: 8px;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  .conf-bar {
    height: 2px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .conf-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* ── Text results ── */
  .text-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 20px;
    gap: 12px;
  }

  .text-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .text-count {
    background: rgba(0,255,163,0.1);
    color: var(--accent);
    padding: 2px 8px;
    font-size: 9px;
    letter-spacing: 1px;
    border-radius: 2px;
  }

  .text-output {
    flex: 1;
    background: var(--panel);
    border: 1px solid rgba(0,255,163,0.1);
    border-radius: 4px;
    padding: 16px;
    overflow-y: auto;
    font-size: 12px;
    line-height: 1.8;
    letter-spacing: 1px;
    color: var(--text);
    scrollbar-width: thin;
    scrollbar-color: var(--dim) transparent;
    position: relative;
  }

  .text-output:empty::before {
    content: 'AWAITING SCAN...';
    color: var(--dim);
    font-size: 10px;
    letter-spacing: 4px;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
  }

  .text-word {
    display: inline-block;
    background: rgba(0,255,163,0.08);
    border: 1px solid rgba(0,255,163,0.15);
    color: var(--accent);
    padding: 2px 8px;
    margin: 3px;
    border-radius: 2px;
    font-size: 13px;
    font-weight: bold;
    animation: wordIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes wordIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Log section ── */
  .log-section {
    padding: 12px 20px;
    border-top: 1px solid rgba(255,255,255,0.04);
    max-height: 140px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--dim) transparent;
  }

  .log-title {
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--dim);
    margin-bottom: 8px;
  }

  .log-entry {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .log-time {
    color: rgba(0,200,255,0.4);
    flex-shrink: 0;
    font-size: 9px;
  }

  .log-msg.success { color: var(--accent); }
  .log-msg.error   { color: var(--warn); }
  .log-msg.info    { color: var(--accent2); }

  /* Progress ring */
  .progress-ring {
    position: absolute;
    top: 12px; right: 12px;
    width: 40px; height: 40px;
    z-index: 10;
    display: none;
  }

  .progress-ring.active { display: block; }

  .progress-ring circle {
    fill: none;
    stroke-width: 2;
  }

  .ring-bg { stroke: rgba(0,255,163,0.1); }
  .ring-fill {
    stroke: var(--accent);
    stroke-linecap: round;
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    transform-origin: center;
    transform: rotate(-90deg);
    transition: stroke-dashoffset 0.3s;
    filter: drop-shadow(0 0 4px var(--accent));
  }

  /* No text badge */
  .no-text-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    color: var(--warn);
    padding: 8px 14px;
    font-size: 11px;
    letter-spacing: 2px;
    border-radius: 2px;
    font-family: 'Orbitron', monospace;
  }

  /* responsive */
  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .panel { max-height: 340px; }
    .camera-section { padding: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SCAN<span>.</span>TEXT</div>
  <div class="status-bar">
    <div class="dot"></div>
    <span id="headerStatus">SYSTEM READY</span>
    <span>v2.4.1</span>
  </div>
</header>

<div class="main">
  <!-- Camera -->
  <div class="camera-section">
    <div class="camera-label">LIVE FEED // CAMERA MODULE</div>

    <div class="viewport" id="viewport">
      <!-- Start prompt -->
      <div id="startPrompt">
        <div class="prompt-icon">📷</div>
        <p>Tap to activate camera</p>
        <button class="btn" onclick="startCamera()"><span>INITIALIZE</span></button>
      </div>

      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>

      <!-- Scan animation -->
      <div class="scan-overlay" id="scanOverlay">
        <div class="scan-line-anim"></div>
      </div>

      <!-- Reticle -->
      <div class="reticle">
        <div class="reticle-ring"></div>
        <div class="reticle-inner"></div>
      </div>

      <!-- Progress ring -->
      <svg class="progress-ring" id="progressRing" viewBox="0 0 40 40">
        <circle class="ring-bg" cx="20" cy="20" r="15"/>
        <circle class="ring-fill" id="ringFill" cx="20" cy="20" r="15"/>
      </svg>
    </div>

    <div class="controls">
      <button class="btn btn-scan" id="scanBtn" onclick="runScan()" disabled>
        <span id="scanBtnText">▶ SCAN OBJECT</span>
      </button>
      <button class="btn btn-secondary" id="clearBtn" onclick="clearResults()" disabled>
        <span>CLR</span>
      </button>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel">
    <div class="panel-header">
      <span>DETECTION OUTPUT</span>
      <span id="scanCounter" style="color:var(--dim)">SCANS: 0</span>
    </div>

    <div class="object-display">
      <div class="object-label">DETECTED OBJECT</div>
      <div class="object-name" id="objectName">—</div>
      <div class="object-confidence" id="confLabel" style="display:none">
        CONFIDENCE
        <div class="conf-bar"><div class="conf-fill" id="confFill"></div></div>
      </div>
    </div>

    <div class="text-section">
      <div class="text-label">
        <span>TEKS PADA KEMASAN</span>
        <span class="text-count" id="wordCount" style="display:none">0 KATA</span>
      </div>
      <div class="text-output" id="textOutput"></div>
    </div>

    <div class="log-section">
      <div class="log-title">SYSTEM LOG</div>
      <div id="logList"></div>
    </div>
  </div>
</div>

<script>
  const video    = document.getElementById('video');
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d');
  const overlay  = document.getElementById('scanOverlay');
  const scanBtn  = document.getElementById('scanBtn');
  const clearBtn = document.getElementById('clearBtn');
  const scanBtnText = document.getElementById('scanBtnText');
  const textOutput = document.getElementById('textOutput');
  const objectName = document.getElementById('objectName');
  const confFill = document.getElementById('confFill');
  const confLabel = document.getElementById('confLabel');
  const wordCount = document.getElementById('wordCount');
  const startPrompt = document.getElementById('startPrompt');
  const headerStatus = document.getElementById('headerStatus');
  const scanCounter = document.getElementById('scanCounter');
  const progressRing = document.getElementById('progressRing');
  const ringFill = document.getElementById('ringFill');
  const logList = document.getElementById('logList');

  let stream = null;
  let scanning = false;
  let totalScans = 0;

  // ── Logging ──
  function log(msg, type='info') {
    const now = new Date();
    const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `<span class="log-time">${t}</span><span class="log-msg ${type}">${msg}</span>`;
    logList.prepend(el);
    if (logList.children.length > 20) logList.lastChild.remove();
  }

  // ── Camera ──
  async function startCamera() {
    try {
      log('Requesting camera access...', 'info');
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        startPrompt.style.display = 'none';
        scanBtn.disabled = false;
        headerStatus.textContent = 'CAMERA ACTIVE';
        log('Camera initialized ✓', 'success');
      };
    } catch(e) {
      // Fallback to user camera
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          startPrompt.style.display = 'none';
          scanBtn.disabled = false;
          headerStatus.textContent = 'CAMERA ACTIVE';
          log('Camera initialized ✓', 'success');
        };
      } catch(e2) {
        log('Camera access denied: ' + e2.message, 'error');
        startPrompt.querySelector('p').textContent = 'Izinkan akses kamera di browser';
      }
    }
  }

  // ── Progress ring ──
  function setProgress(pct) {
    const circumference = 2 * Math.PI * 15; // r=15
    const offset = circumference * (1 - pct / 100);
    ringFill.style.strokeDasharray = circumference;
    ringFill.style.strokeDashoffset = offset;
  }

  // ── Draw bounding boxes ──
  function drawBoxes(words) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!words || words.length === 0) return;

    // mirror because video is mirrored
    ctx.save();
    ctx.scale(-1, 1);
    ctx.translate(-canvas.width, 0);

    words.forEach((w, i) => {
      if (!w.bbox || w.confidence < 30) return;
      const { x0, y0, x1, y1 } = w.bbox;
      const pad = 3;
      const bx = x0 - pad, by = y0 - pad;
      const bw = (x1 - x0) + pad * 2;
      const bh = (y1 - y0) + pad * 2;

      // Box glow
      ctx.shadowColor = '#00ffa3';
      ctx.shadowBlur = 8;
      ctx.strokeStyle = '#00ffa3';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(bx, by, bw, bh);

      // Corner dots
      ctx.fillStyle = '#00ffa3';
      ctx.shadowBlur = 12;
      [[bx, by],[bx+bw, by],[bx, by+bh],[bx+bw, by+bh]].forEach(([cx,cy]) => {
        ctx.beginPath();
        ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
        ctx.fill();
      });

      // Label background
      ctx.shadowBlur = 0;
      const label = w.text.trim();
      if (label.length < 1) return;
      ctx.font = 'bold 11px Share Tech Mono, monospace';
      const tw = ctx.measureText(label).width;
      ctx.fillStyle = 'rgba(0,10,8,0.85)';
      ctx.fillRect(bx, by - 18, tw + 10, 18);
      ctx.fillStyle = '#00ffa3';
      ctx.fillText(label, bx + 5, by - 5);
    });

    ctx.restore();
  }

  // ── Main scan ──
  async function runScan() {
    if (scanning || !stream) return;
    scanning = true;
    scanBtn.disabled = true;
    clearBtn.disabled = true;
    scanBtnText.textContent = '⟳ SCANNING...';
    overlay.classList.add('active');
    progressRing.classList.add('active');
    headerStatus.textContent = 'ANALYZING...';
    textOutput.innerHTML = '';
    objectName.textContent = '—';
    confLabel.style.display = 'none';
    wordCount.style.display = 'none';
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    log('Initiating scan sequence...', 'info');
    setProgress(5);

    // Capture snapshot
    const snap = document.createElement('canvas');
    snap.width  = video.videoWidth;
    snap.height = video.videoHeight;
    const sCtx = snap.getContext('2d');
    // Mirror compensate (video is CSS-mirrored, capture actual)
    sCtx.drawImage(video, 0, 0);

    setProgress(20);
    log('Frame captured. Running OCR engine...', 'info');

    try {
      const result = await Tesseract.recognize(snap, 'eng+ind', {
        logger: m => {
          if (m.status === 'recognizing text') {
            const p = Math.round(20 + m.progress * 70);
            setProgress(p);
          }
        }
      });

      setProgress(95);

      const words = result.data.words.filter(w => {
        const t = w.text.trim();
        return t.length >= 2 && w.confidence > 35 && /[a-zA-Z0-9]/.test(t);
      });

      const lines = result.data.lines.filter(l => {
        const t = l.text.trim();
        return t.length >= 2 && l.confidence > 35;
      });

      totalScans++;
      scanCounter.textContent = `SCANS: ${totalScans}`;

      if (words.length > 0) {
        // Draw boxes
        drawBoxes(words);

        // Show object name (first high-conf long word or first line)
        const bestLine = lines.find(l => l.text.trim().length > 3);
        const displayName = bestLine
          ? bestLine.text.trim().substring(0, 20).toUpperCase()
          : words[0].text.trim().toUpperCase();
        objectName.textContent = displayName;

        const avgConf = Math.round(words.reduce((a,b) => a + b.confidence, 0) / words.length);
        confFill.style.width = avgConf + '%';
        confLabel.style.display = 'block';

        // Populate word chips
        const uniqueWords = [...new Set(words.map(w => w.text.trim()))].slice(0, 60);
        textOutput.innerHTML = '';
        uniqueWords.forEach((w, i) => {
          const chip = document.createElement('span');
          chip.className = 'text-word';
          chip.textContent = w;
          chip.style.animationDelay = (i * 0.04) + 's';
          textOutput.appendChild(chip);
        });

        wordCount.style.display = 'inline-block';
        wordCount.textContent = `${uniqueWords.length} KATA`;
        log(`Detected ${words.length} words (avg conf: ${avgConf}%)`, 'success');
        headerStatus.textContent = `${words.length} WORDS FOUND`;

      } else {
        // No text found
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        objectName.textContent = 'NO TEXT';
        textOutput.innerHTML = '<div class="no-text-badge">⚠ TIDAK ADA TEKS TERDETEKSI</div>';
        log('No readable text found on object', 'error');
        headerStatus.textContent = 'NO TEXT DETECTED';
      }

    } catch(err) {
      log('OCR error: ' + err.message, 'error');
      headerStatus.textContent = 'SCAN ERROR';
    }

    setProgress(100);
    setTimeout(() => {
      progressRing.classList.remove('active');
      setProgress(0);
    }, 600);

    overlay.classList.remove('active');
    scanBtnText.textContent = '▶ SCAN OBJECT';
    scanBtn.disabled = false;
    clearBtn.disabled = false;
    scanning = false;
  }

  // ── Clear ──
  function clearResults() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    textOutput.innerHTML = '';
    objectName.textContent = '—';
    confLabel.style.display = 'none';
    wordCount.style.display = 'none';
    headerStatus.textContent = 'CAMERA ACTIVE';
    clearBtn.disabled = true;
    log('Results cleared', 'info');
  }

  // keyboard shortcut
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && !scanBtn.disabled) { e.preventDefault(); runScan(); }
  });

  log('System initialized. Awaiting camera activation.', 'info');
</script>
</body>
</html>
